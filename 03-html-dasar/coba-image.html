<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Image</title>
  </head>
  <body>
    <a href="https://lerevon.framer.ai/" target="_blank">
      <img
        src="image/Windows XP Background.jpg"
        alt="Foto Windows XP"
        width="50%"
      />
    </a>
    <img
      src="https://framerusercontent.com/images/y3LADc7sJBHtVVXS4XSJCMd5bM.png?scale-down-to=1024&width=1080&height=1350"
      alt="Foto Test"
      width="50%"
    />
    <!-- 
    1. Biar ga gepeng ,ukuranya asli (4500x3000) dibagi 2, kalau ga widthnya ajah yang di ganti
    2. Gunakan %(relatif) jadi ukuran menyesuaikan breakpoint view
    3. Tambah <a href=""></a>, jika photo tersebut ada referensi link yang bisa masuk ke tab selanjutnya atau tab halaman sendiri
    -->
  </body>
</html>
