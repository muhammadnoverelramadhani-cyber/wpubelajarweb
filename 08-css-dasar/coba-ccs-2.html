<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba CSS - Selector & Property</title>
    <style>
      h1 {
        font-size: 120px;
        font-family: Arial;
        color: #ff5733;
        text-align: center;
      }

      #p2 {
        font-size: 18px;
        font-family: Verdana;
        color: #00ff2a;
        text-align: center;
      }

      .p2 {
        font-size: 18px;
        font-family: Verdana;
        color: #3ce2ff;
        text-align: center;
      }

      #judul {
        text-transform: uppercase;
      }

      #garis-bawah {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <h1 id="judul">Hallo Cemere</h1>
    <p id="garis-bawah">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Commodi, enim..
    </p>
    <!-- Paragraph with class p2 -->
    <p class="p2">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Commodi, enim..
    </p>
    <!-- Paragraph with ID p2 -->
    <p id="p2">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Commodi, enim..
    </p>
  </body>
</html>
