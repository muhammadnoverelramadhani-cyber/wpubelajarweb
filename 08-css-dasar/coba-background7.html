<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiple Backgrounds</title>
    <style>
      body {
        min-height: 100vh;
        font-family: sans-serif;
        background-color: lightblue;
      }
      .frame {
        width: 400px;
        height: 400px;
        border: 10px solid #000000;
        margin: auto;
        background-image:
          url(img/Lerepository-2026.png), url(img/WXP4K.png),
          url(img/WXP4NK.png);
        background-size: 320px, 400px, 700px;
        background-repeat: no-repeat, no-repeat, no-repeat;
        background-position:
          center bottom,
          center top,
          center bottom;
        background-color: #ffffff;
        border-radius: 64px;
      }
      h1 {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>My Logo Card</h1>
    <div class="frame"></div>
  </body>
</html>
