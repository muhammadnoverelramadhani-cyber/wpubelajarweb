<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Elemen Form</title>
  </head>
  <body>
    <h1>Contoh elemen-elemen form pada HTML</h1>

    <form>
      <label for="nama"
        >Nama:
        <input type="text" name="nama" id="nama" placeholder="Masukan Cemere"
      />
      <br>
      
      <label for="password">Password:
        <input type="password" name="password" id="password" placeholder="Masukan password" />
      </label>
      <br>

      <label for="email">Email:
        <input type="email" name="email" id="email" placeholder="Masukan email">
      </label>
      <br>

      <label for="angka">Umur:
        <input type="number" name="angka" id="angka" placeholder="Masukan Angka" min="0" max="20">
      </label>
      <br>

      <label for="tanggal">Tanggal
        <input type="date" name="tanggal" id="tanggal">
      </label>
      <br>

      <label for="warna">Warna Favorit
        <input type="color" name="warna" id="warna">
        </label>
        
      <br>
      <button type="submit">Kirim Jer</button>
    </form>
  </body>
</html>
