<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merge Table</title>
  </head>
  <body>
    <table border="1" cellpadding="8" cellspacing="0">
      <tr>
        <td rowspan="3">rowspan = 3</td>
        <td colspan="3">colspan = 3</td>
      </tr>
      <tr>
        <td>2,1</td>
        <td>2,2</td>
        <td>2,3</td>
      </tr>
      <tr>
        <td>3,1</td>
        <td>3,2</td>
        <td>3,3</td>
      </tr>
    </table>
  </body>
</html>
