<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Elemen Form di Dalam Tabel</title>
  </head>
  <body>
    <h1>Contoh elemen-elemen form pada HTML</h1>

    <form>
      <table cellpadding="4">
        <tr>
          <tr>
            <td align="right"><label for="nama">Nama:</label></td>
            <td><input type="text" name="nama" id="nama" placeholder="Masukan Cemere"
      /></td>
          </tr>
          <tr>
            <td align="right"><label for="password">Password:</label></td>
            <td><input type="password" name="password" id="password" placeholder="Masukan password" /></td>
          </tr>
          <tr>
            <td align="right"><label for="email">Email:</label></td>
            <td>        <input type="email" name="email" id="email" placeholder="Masukan email"></td>
          </tr>
          <tr>
            <td align="right"><label for="angka">Umur:</label></td>
            <td><input type="number" name="angka" id="angka" placeholder="Masukan Angka" min="0" max="20"></td>
          </tr>
          <tr>
            <td align="right"><label for="tanggal">Tanggal</label></td>
            <td><input type="date" name="tanggal" id="tanggal"></td>
          </tr>
          <tr>
            <td align="right"><label for="warna">Warna Favorit</label></td>
            <td><input type="color" name="warna" id="warna"></td>
          </tr>
          <tr>
            <td colspan="14" align="center">
              <button type="submit">Kirim Jer</button>
            </td>
          </tr>
        </tr>
      </table>  
    </form>
  </body>
</html>
